# Root Directory = "." (repo kökü) — Nixpacks + kök nixpacks.toml
# Docker kullanmak istersen: builder = "DOCKERFILE" + dockerfilePath = "Dockerfile"
[build]
builder = "NIXPACKS"

[deploy]
# Kabuk yok: "cd" tek başına çalışmaz. Repo kökünden backend giriş dosyası:
startCommand = "node backend/src/index.js"
restartPolicyType = "ON_FAILURE"
