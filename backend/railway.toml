# Railway Root Directory = "backend" ise bu ayar + bu klasördeki Dockerfile kullanılır.
# Root Directory = repo kökü (.) ise üst dizindeki Dockerfile + üst railway.toml geçerlidir.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/health"
healthcheckTimeout = 120
